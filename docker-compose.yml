services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.local
    ports:
      - "5173:5173"
    env_file:
      - path: ./frontend/.env
        required: false
    depends_on:
      - backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.local
    ports:
      - "8001:8001"
    env_file:
      - path: ./backend/.env
        required: false
