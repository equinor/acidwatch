[project]
name = "acidwatch"
description = "CLI for AcidWatch"
readme = "README.md"
requires-python = ">=3.12, <3.14"
dependencies = []
dynamic = ["version"]

[project.scripts]
acidwatch = "acidwatch.cli:main"

[dependency-groups]
dev = [
  "mypy",
  "pytest",
  "pytest-asyncio",
  "ruff",
]

[build-system]
requires = ["hatchling", "uv-dynamic-versioning"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "uv-dynamic-versioning"
