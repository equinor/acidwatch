[project]
name = "acidwatch"
version = "0.1.0"
description = "CLI for AcidWatch"
readme = "README.md"
requires-python = ">=3.12, <3.14"
dependencies = []

[project.scripts]
acidwatch = "acidwatch.cli:main"

[dependency-groups]
dev = [
  "mypy",
  "pytest",
  "pytest-asyncio",
  "ruff",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
